<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anagram Duel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== HOME SCREEN ===== -->
  <div id="home-screen" class="screen active">
    <div class="home-card">
      <div class="logo">
        <span class="logo-letter">A</span>
        <span class="logo-letter">N</span>
        <span class="logo-letter">A</span>
        <span class="logo-letter">G</span>
        <span class="logo-letter">R</span>
        <span class="logo-letter">A</span>
        <span class="logo-letter">M</span>
      </div>
      <p class="tagline">DUEL</p>

      <div class="form-group">
        <label for="player-name">Your Name</label>
        <input type="text" id="player-name" placeholder="Enter your name" maxlength="20" autocomplete="off" />
      </div>

      <button id="create-btn" class="btn btn-primary btn-large">Create Game</button>

      <div class="divider"><span>or</span></div>

      <div class="join-section">
        <div class="form-group">
          <label for="join-code">Room Code</label>
          <input type="text" id="join-code" placeholder="Enter 6-character code" maxlength="6"
                 autocomplete="off" autocapitalize="characters" />
        </div>
        <button id="join-btn" class="btn btn-secondary btn-large">Join Game</button>
      </div>

      <p id="home-error" class="error-msg" aria-live="polite"></p>
    </div>
  </div>

  <!-- ===== WAITING SCREEN ===== -->
  <div id="waiting-screen" class="screen">
    <div class="waiting-card">
      <h2>Waiting for opponent&hellip;</h2>
      <div class="room-code-block">
        <p class="room-code-label">Room Code</p>
        <div class="room-code-display" id="waiting-code">------</div>
        <button id="copy-code-btn" class="btn btn-outline">Copy Code</button>
        <span id="copy-feedback" class="copy-feedback">Copied!</span>
      </div>
      <p class="share-hint">Share this code with your friend</p>
      <div class="spinner"></div>
    </div>
  </div>

  <!-- ===== GAME SCREEN ===== -->
  <div id="game-screen" class="screen">

    <!-- Countdown overlay -->
    <div id="countdown-overlay" class="countdown-overlay hidden">
      <div id="countdown-number" class="countdown-number">3</div>
    </div>

    <div class="game-layout">

      <!-- Header: scores + timer -->
      <div class="game-header">
        <div class="player-score" id="my-score-panel">
          <span class="player-label" id="my-name-label">You</span>
          <span class="score-value" id="my-score">0</span>
        </div>

        <div class="timer-block">
          <div class="timer-display" id="timer-display">1:30</div>
        </div>

        <div class="player-score opp" id="opp-score-panel">
          <span class="score-value" id="opp-score">0</span>
          <span class="player-label" id="opp-name-label">Opponent</span>
        </div>
      </div>

      <!-- Timer progress bar -->
      <div class="timer-bar-track">
        <div class="timer-bar" id="timer-bar"></div>
      </div>

      <!-- Letter tiles -->
      <div id="letter-tiles" class="letter-tiles" role="group" aria-label="Available letters"></div>

      <!-- Word construction area -->
      <div id="word-area" class="word-area" role="group" aria-label="Selected letters"></div>

      <!-- Word feedback -->
      <div id="word-feedback" class="word-feedback" aria-live="polite"></div>

      <!-- Action buttons -->
      <div class="action-buttons">
        <button id="shuffle-btn" class="btn btn-outline">Shuffle</button>
        <button id="clear-btn" class="btn btn-outline">Clear</button>
        <button id="submit-btn" class="btn btn-primary">Submit</button>
      </div>

      <!-- Found words -->
      <div class="found-words-section">
        <h3 class="found-words-title">Your Words</h3>
        <div id="found-words-list" class="found-words-list"></div>
      </div>

    </div><!-- .game-layout -->
  </div><!-- #game-screen -->

  <!-- ===== END SCREEN ===== -->
  <div id="end-screen" class="screen">
    <div class="end-card">
      <div id="result-title" class="result-title">YOU WIN!</div>

      <div class="results-grid" id="results-grid">
        <!-- Populated by JS -->
      </div>

      <button id="rematch-btn" class="btn btn-primary btn-large">Play Again</button>
      <p id="rematch-status" class="rematch-status" aria-live="polite"></p>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
